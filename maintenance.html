<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intel Console — Maintenance</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <meta name="theme-color" content="#0a0a0f">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #c0c0c0;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        h1 {
            font-size: 1.6rem;
            color: #e0e0e0;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
        .line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #6a5acd, transparent);
            margin: 1.5rem auto;
        }
        p {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #888;
        }
        .status {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #6a5acd;
            letter-spacing: 0.1em;
        }
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #6a5acd;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s ease-in-out infinite;
            vertical-align: middle;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(106,90,205,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(106,90,205,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="container">
        <h1>Intel Console</h1>
        <div class="line"></div>
        <p>The intelligence graph is currently undergoing maintenance.<br>
        907 entities and 2,082 relationships are being recalibrated.</p>
        <div class="line"></div>
        <div class="status"><span class="pulse"></span>MAINTENANCE IN PROGRESS</div>
    </div>
</body>
</html>
